methodology_summary: RecruiterRank-Hybrid streams each candidate record, preprocesses profile/career/skills/education/Redrob signals, extracts evidence-based features, scores technical fit, career evidence, experience fit, product/company fit, behavioral availability, location fit, and GitHub activity, applies risk penalties for suspicious profiles and keyword stuffing, then keeps top candidates using heapq and writes the final top 100 with grounded reasoning.
